<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>United Food Ordering</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
      background-size: cover;
      color: #333;
    }
    nav {
      background-color: black;
      color: white;
      padding: 15px 40px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }
    .hero {
      background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=1600&q=80') no-repeat center center;
      background-size: cover;
      text-align: center;
      padding: 120px 20px;
      color: white;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
    }
    .hero h1 { font-size: 3rem; font-weight: bold; }
    /* Sidebar Cart */
    #cartSidebar {
      position: fixed;
      top: 0;
      right: -400px;
      width: 400px;
      height: 100%;
      background: #fff;
      box-shadow: -4px 0 8px rgba(0,0,0,0.2);
      transition: right 0.3s ease;
      z-index: 1050;
      overflow-y: auto;
    }
    #cartSidebar.open { right: 0; }
    #cartSidebar .header {
      background: black;
      color: #fff;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #cartItems .cart-item {
      border-bottom: 1px solid #ddd;
      padding: 10px;
      display: flex;
      align-items: center;
    }
    #cartItems .cart-item img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      margin-right: 10px;
    }
    #cartItems .cart-item-details {
      flex: 1;
    }
    #cartItems .qty-controls button {
      border: none;
      background: #d32f2f;
      color: #fff;
      padding: 3px 8px;
      border-radius: 5px;
      margin: 0 3px;
      cursor: pointer;
    }
    footer {
      text-align: center;
      padding: 15px;
      background-color: #222;
      color: #ddd;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="#">United Food</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarsExample">
      <ul class="navbar-nav me-3">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#menu">Menu</a></li>
        <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
      </ul>
      <button id="cartBtn" class="btn btn-light">
        🛒 Cart (<span id="cart-count">0</span>)
      </button>
    </div>
  </div>
</nav>

<!-- Search Box -->
<div class="container my-4">
  <input type="text" id="searchBox" class="form-control" placeholder="Search for food...">
</div>

<!-- Hero Section -->
<section class="hero">
  <div>
    <h1>Welcome to United Food</h1>
    <p class="lead"><b>Delicious Food Delivered Fresh & Fast</b></p>
    <a href="#menu" class="btn btn-warning btn-lg mt-3">Order Now</a>
  </div>
</section>

<!-- Food Items -->
<div class="container mt-5" id="menu">
  <h2 class="text-center mb-4 text-white"><b>OUR POPULAR DISHES</b> </h2>
  <div class="row g-4" id="product-list">
    <!-- Products load dynamically -->
  </div>
</div>

<!-- Cart Sidebar -->
<div id="cartSidebar">
  <div class="header">
    <span>Your Cart</span>
    <button id="closeCart" class="btn btn-sm btn-light">X</button>
  </div>
  <div id="cartItems" class="p-3"></div>
  <div class="p-3 border-top">
    <h5>Total: Rs <span id="cart-total">0</span></h5>
    <button class="btn btn-dark w-100 mt-2" data-bs-toggle="modal" data-bs-target="#orderModal">Proceed to Order</button>
  </div>
</div>

<!-- Order Modal -->
<div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="order-form">
        <div class="modal-header">
          <h5 class="modal-title">Complete Your Order</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">Name</label><input type="text" class="form-control" name="customerName" required></div>
          <div class="mb-3"><label class="form-label">Phone</label><input type="text" class="form-control" name="phone" required></div>
          <div class="mb-3"><label class="form-label">Address</label><textarea class="form-control" name="address" required></textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-success">Place Order</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Footer -->
<footer id="contact">
  <div class="container">
    <p>&copy; 2025 United Food. All Rights Reserved.</p>
    <p>Call us: +92 300 1234567 | Email: info@unitedfood.com</p>
  </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const cart = [];
  const cartCount = document.getElementById('cart-count');
  const cartItems = document.getElementById('cartItems');
  const cartTotal = document.getElementById('cart-total');
  const productList = document.getElementById('product-list');

  async function loadProducts() {
    try {
      const res = await fetch('/api/products');   // <-- fetch products from backend
      if (!res.ok) throw new Error('Failed to fetch products');
      const products = await res.json();

      // Group products by category
      const categories = {};
      products.forEach(p => {
        const category = p.category || 'Other';
        if (!categories[category]) categories[category] = [];
        categories[category].push(p);
      });

      productList.innerHTML = '';

      // Render each category section
      Object.keys(categories).forEach(category => {
        productList.innerHTML += `
          <div class="category-section mt-5">
            <h2 class="text-center text-white mb-4 border-bottom pb-2"><b> ${category}</b> </h2>
            <div class="row g-4">
 
             ${categories[category].map(p => `
                <div class="col-md-3">
                  <div class="card food-card shadow-sm h-100">
                    <img src="${p.imageUrl || 'https://via.placeholder.com/400x300'}" class="card-img-top" alt="${p.name}">
                    <div class="card-body text-center d-flex flex-column">
                      <h5 class="card-title product-name">${p.name}</h5>
                      <p class="card-text text-muted product-desc ">${p.description || ''}</p>
                      <p class = "product-price"><strong>Rs ${p.price}</strong></p>
                      <button class="btn btn-primary mt-auto add-to-cart"
                              data-name="${p.name}"
                              data-price="${p.price}">
                        Add to Cart
                      </button>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      });

      document.querySelectorAll('.add-to-cart').forEach(btn => {
        btn.addEventListener('click', () => {
          const name = btn.dataset.name;
          const price = parseInt(btn.dataset.price);
          const image = btn.dataset.image;
          const item = cart.find(i => i.name === name);
          if (item) item.qty++;
          else cart.push({ name, price, image, qty: 1 });
          updateCart();
        });
      });

    } catch (err) {
      console.error('Error loading products:', err);
      productList.innerHTML = `<p class="text-danger text-center">Error loading products. Please check backend.</p>`;
    }
  }

  function updateCart() {
    cartItems.innerHTML = '';
    let total = 0;
    cart.forEach((item, index) => {
      total += item.price * item.qty;
      cartItems.innerHTML += `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}">
          <div class="cart-item-details">
            <h6>${item.name}</h6>
            <p class="mb-0">Rs ${item.price * item.qty}</p>
          </div>
          <div class="qty-controls">
            <button onclick="decreaseQty(${index})">-</button>
            <span>${item.qty}</span>
            <button onclick="increaseQty(${index})">+</button>
          </div>
        </div>
      `;
    });
    cartCount.textContent = cart.reduce((sum, i) => sum + i.qty, 0);
    cartTotal.textContent = total;
  }

  function increaseQty(index) {
    cart[index].qty++;
    updateCart();
  }
  function decreaseQty(index) {
    if (cart[index].qty > 1) cart[index].qty--;
    else cart.splice(index, 1);
    updateCart();
  }

  document.getElementById('order-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target).entries());
    data.items = cart;
    data.total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);

    try {
      const res = await fetch('/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error('Order not saved');
      alert('Order placed successfully!');
      cart.length = 0;
      updateCart();
      e.target.reset();
      bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide();
    } catch (err) {
      alert('Error placing order: ' + err.message);
    }
  });

  // Search
  document.getElementById("searchBox").addEventListener("keyup", function () {
    let input = this.value.toLowerCase();
    let products = document.querySelectorAll(".food-card");

    products.forEach(function (card) {
      let name = card.querySelector(".product-name").textContent.toLowerCase();
      let desc = card.querySelector(".product-desc").textContent.toLowerCase();
      let price = card.querySelector(".product-price").textContent.toLowerCase();

      card.parentElement.style.display =
        name.includes(input) || desc.includes(input) || price.includes(input) ? "block" : "none";
    });
  });

  // Sidebar toggle
  document.getElementById("cartBtn").addEventListener("click", () => {
    document.getElementById("cartSidebar").classList.add("open");
  });
  document.getElementById("closeCart").addEventListener("click", () => {
    document.getElementById("cartSidebar").classList.remove("open");
  });

  loadProducts();
</script>
</body>
</html>
